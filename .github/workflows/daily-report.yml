name: 设计系统日报推送飞书

on:
  schedule:
    - cron: '0 1 * * *'   # 北京时间 09:00（UTC+8，GitHub Actions 用 UTC）
    - cron: '0 9 * * *'   # 北京时间 17:00
  workflow_dispatch:        # 支持手动触发，方便测试

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 获取完整 git 历史，确保能查到今天的提交

      - name: 生成日报并推送飞书
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python3 .github/scripts/send_report.py
