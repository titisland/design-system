<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Type — Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-cn);color:var(--fg-default);padding:20px}
  .r{display:flex;align-items:baseline;gap:16px;padding:4px 0}
  .r .sz{width:68px;color:#999;font-size:11px;font-variant-numeric:tabular-nums}
  .r .w{width:72px;color:#999;font-size:11px}
</style></head>
<body>
  <div class="r"><span class="sz">24 / 500</span><span class="w">Hero</span><span style="font-size:24px;font-weight:500;color:#000">维我替尼产品研讨会</span></div>
  <div class="r"><span class="sz">20 / 500</span><span class="w">Section</span><span style="font-size:20px;font-weight:500">医生详情</span></div>
  <div class="r"><span class="sz">17 / 500</span><span class="w">NavBar</span><span style="font-size:17px;font-weight:500">Veeva China CRM</span></div>
  <div class="r"><span class="sz">16 / 500</span><span class="w">Title</span><span style="font-size:16px;font-weight:500">李大魁</span></div>
  <div class="r"><span class="sz">14 / 400</span><span class="w">Body</span><span style="font-size:14px">会议开始时间：2025-05-10</span></div>
  <div class="r"><span class="sz">13 / 400</span><span class="w">Body sm</span><span style="font-size:13px;color:#999">请输入要查找的名称</span></div>
  <div class="r"><span class="sz">12 / 400</span><span class="w">Caption</span><span style="font-size:12px;color:#999">共计16条</span></div>
  <div class="r"><span class="sz">10 / 400</span><span class="w">Micro</span><span style="font-size:10px;color:#999">MICRO</span></div>
</body></html>
