<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Input & FAB — Chat AI Agent</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../lists.css">
<link rel="stylesheet" href="../chat-shell.css">
<link rel="stylesheet" href="../chat-cards.css">
<style>
html, body { margin:0; padding:0; background:#F8F8F8; font-family:var(--font-cn); color:var(--fg-default); }
.preview-page { max-width:860px; margin:0 auto; padding:32px 24px 80px; }
h2 { font-size:13px; font-weight:600; color:#999; letter-spacing:0.06em; text-transform:uppercase;
      margin:48px 0 16px; border-top:1px solid #EEE; padding-top:24px; }
h2:first-of-type { margin-top:0; }
.swatch-row { display:flex; gap:16px; flex-wrap:wrap; align-items:flex-start; }
.label { font-size:12px; color:#999; margin-bottom:6px; }
.note { font-size:12px; color:#888; background:#FFF8E6; border-left:3px solid #F7981D;
         padding:8px 12px; border-radius:0 4px 4px 0; margin-top:12px; line-height:18px; }
.note code { font-family:monospace; font-size:11px; color:#555; }
.fab-scene { position:relative; width:375px; height:200px; background:#F8F8F8;
             border-radius:12px; overflow:hidden; }
.fab-scene .ea-chat-fab { position:absolute; right:16px; bottom:16px; }
.fab-scene .ea-chat-hint { position:absolute; right:16px; bottom:calc(16px + 42px + 8px); }
</style>
</head>
<body>
<div class="preview-page">
  <!-- ═══════════════════════════════════════════════════════
       5. INPUT BAR — 按住说话 pill (full-radius, phantom spacer)
       ═══════════════════════════════════════════════════════ -->
  <h2>5. Input bar — 按住说话 default</h2>
  <!-- Glass-blur dock shell — same pattern as Voice dock, no mode-pill -->
  <div style="width:375px; background:rgba(255,255,255,0.6); -webkit-backdrop-filter:blur(12px); backdrop-filter:blur(12px); border-radius:20px 20px 0 0; padding:16px; display:flex; flex-direction:column; align-items:center; gap:8px;">
    <!-- White inner panel -->
    <div style="width:100%; background:#fff; border-radius:12px; box-shadow:0 0 20px rgba(0,0,0,0.15); overflow:hidden;">
      <div style="padding:12px; display:flex; align-items:center; position:relative;">
        <!-- Keyboard icon — left-anchored -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="24" height="24" style="position:absolute; left:12px; top:50%; transform:translateY(-50%);">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="M6 8h.01"/><path d="M10 8h.01"/><path d="M14 8h.01"/><path d="M18 8h.01"/>
          <path d="M8 12h.01"/><path d="M12 12h.01"/><path d="M16 12h.01"/>
          <path d="M7 16h10"/>
        </svg>
        <span style="flex:1; text-align:center; font-family:var(--font-cn); font-weight:500; font-size:16px; color:#333;">按住说话</span>
      </div>
    </div>
    <!-- AI disclaimer — same as voice dock -->
    <div style="font-family:var(--font-cn); font-size:12px; color:#AAA;">内容由 AI 生成</div>
  </div>

  <!-- ═══════════════════════════════════════════════════════
       5b. BOT ENTRY — FAB + HINT BUBBLE
       ═══════════════════════════════════════════════════════ -->
  <h2>5b. Bot entry — FAB + hint bubble (Figma 320:6797)</h2>
  <div class="swatch-row">

    <!-- Scene with both -->
    <div class="fab-scene">
      <div style="position:absolute;left:12px;top:12px;font-size:12px;color:#CCC;">
        列表/详情页
      </div>
      <!-- Hint bubble -->
      <div class="ea-chat-hint">
        <div class="ea-chat-hint__row">
          <span class="ea-chat-hint__icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 30" fill="currentColor" width="16" height="16">
              <path d="M22.956 22.956C20.754 21.221 19.103 20.012 17.668 19.318 16.215 21.409 15.632 24.66 15 30c-.632-5.34-1.215-8.591-2.668-10.682C10.898 20.012 9.246 21.219 7.044 22.956 8.781 20.754 9.988 19.103 10.682 17.668 8.591 16.215 5.34 15.632 0 15c5.34-.632 8.591-1.215 10.682-2.668C9.988 10.898 8.781 9.246 7.044 7.044c2.202 1.737 3.854 2.944 5.288 3.638C13.785 8.591 14.368 5.34 15 0c.632 5.34 1.215 8.591 2.668 10.682 1.435-.694 3.086-1.901 5.288-3.638-1.735 2.202-2.944 3.854-3.638 5.288C21.409 13.785 24.66 14.368 30 15c-5.34.632-8.591 1.215-10.682 2.668.694 1.435 1.901 3.086 3.638 5.288z"/>
            </svg>
          </span>
          <span class="ea-chat-hint__text">您有一个医学问询尚未提交</span>
        </div>
        <div class="ea-chat-hint__footer">
          <span class="ea-chat-hint__dismiss">忽略</span>
        </div>
      </div>
      <!-- FAB -->
      <button class="ea-chat-fab" aria-label="AI 助手">
        <span class="ea-chat-fab__icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 30" fill="white" width="28" height="28" style="filter:drop-shadow(0 1px 2px rgba(230,81,0,0.8))">
            <path d="M22.956 22.956C20.754 21.221 19.103 20.012 17.668 19.318 16.215 21.409 15.632 24.66 15 30c-.632-5.34-1.215-8.591-2.668-10.682C10.898 20.012 9.246 21.219 7.044 22.956 8.781 20.754 9.988 19.103 10.682 17.668 8.591 16.215 5.34 15.632 0 15c5.34-.632 8.591-1.215 10.682-2.668C9.988 10.898 8.781 9.246 7.044 7.044c2.202 1.737 3.854 2.944 5.288 3.638C13.785 8.591 14.368 5.34 15 0c.632 5.34 1.215 8.591 2.668 10.682 1.435-.694 3.086-1.901 5.288-3.638-1.735 2.202-2.944 3.854-3.638 5.288C21.409 13.785 24.66 14.368 30 15c-5.34.632-8.591 1.215-10.682 2.668.694 1.435 1.901 3.086 3.638 5.288z"/>
          </svg>
        </span>
      </button>
    </div>

    <!-- FAB alone -->
    <div>
      <div class="label">FAB only</div>
      <button class="ea-chat-fab">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 30" fill="white" width="28" height="28" style="filter:drop-shadow(0 1px 2px rgba(230,81,0,0.8))">
          <path d="M22.956 22.956C20.754 21.221 19.103 20.012 17.668 19.318 16.215 21.409 15.632 24.66 15 30c-.632-5.34-1.215-8.591-2.668-10.682C10.898 20.012 9.246 21.219 7.044 22.956 8.781 20.754 9.988 19.103 10.682 17.668 8.591 16.215 5.34 15.632 0 15c5.34-.632 8.591-1.215 10.682-2.668C9.988 10.898 8.781 9.246 7.044 7.044c2.202 1.737 3.854 2.944 5.288 3.638C13.785 8.591 14.368 5.34 15 0c.632 5.34 1.215 8.591 2.668 10.682 1.435-.694 3.086-1.901 5.288-3.638-1.735 2.202-2.944 3.854-3.638 5.288C21.409 13.785 24.66 14.368 30 15c-5.34.632-8.591 1.215-10.682 2.668.694 1.435 1.901 3.086 3.638 5.288z"/>
        </svg>
      </button>
    </div>

    <!-- Hint bubble alone -->
    <div>
      <div class="label">Hint bubble only</div>
      <div class="ea-chat-hint" style="position:relative;">
        <div class="ea-chat-hint__row">
          <span class="ea-chat-hint__icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 30" fill="currentColor" width="16" height="16">
              <path d="M22.956 22.956C20.754 21.221 19.103 20.012 17.668 19.318 16.215 21.409 15.632 24.66 15 30c-.632-5.34-1.215-8.591-2.668-10.682C10.898 20.012 9.246 21.219 7.044 22.956 8.781 20.754 9.988 19.103 10.682 17.668 8.591 16.215 5.34 15.632 0 15c5.34-.632 8.591-1.215 10.682-2.668C9.988 10.898 8.781 9.246 7.044 7.044c2.202 1.737 3.854 2.944 5.288 3.638C13.785 8.591 14.368 5.34 15 0c.632 5.34 1.215 8.591 2.668 10.682 1.435-.694 3.086-1.901 5.288-3.638-1.735 2.202-2.944 3.854-3.638 5.288C21.409 13.785 24.66 14.368 30 15c-5.34.632-8.591 1.215-10.682 2.668.694 1.435 1.901 3.086 3.638 5.288z"/>
            </svg>
          </span>
          <span class="ea-chat-hint__text">您有一个医学问询尚未提交</span>
        </div>
        <div class="ea-chat-hint__footer">
          <span class="ea-chat-hint__dismiss">忽略</span>
        </div>
      </div>
    </div>
  </div>


</div>
</body>
</html>
