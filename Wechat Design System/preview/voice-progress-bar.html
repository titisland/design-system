<!doctype html><html lang="zh-CN"><head><meta charset="utf-8" />
<title>Progress bar</title><link rel="stylesheet" href="base.css" /></head><body>
<div class="card">

  <!-- 40% -->
  <div class="label" style="margin-bottom:4px;">40%</div>
  <div style="display:flex;align-items:center;gap:8px;padding:4px 0;max-width:343px;">
    <span style="font-family:var(--font-cn);font-weight:500;font-size:12px;color:#333;white-space:nowrap;">填写进度：</span>
    <div style="flex:1;height:18px;border-radius:8px;background:#F0F0F0;overflow:hidden;">
      <div style="width:40%;height:100%;background:#00CD88;display:flex;justify-content:flex-end;align-items:center;padding-right:8px;color:#fff;font-family:var(--font-cn);font-weight:500;font-size:10px;">40%</div>
    </div>
  </div>

  <!-- 75% -->
  <div class="label" style="margin-bottom:4px;margin-top:8px;">75%</div>
  <div style="display:flex;align-items:center;gap:8px;padding:4px 0;max-width:343px;">
    <span style="font-family:var(--font-cn);font-weight:500;font-size:12px;color:#333;white-space:nowrap;">填写进度：</span>
    <div style="flex:1;height:18px;border-radius:8px;background:#F0F0F0;overflow:hidden;">
      <div style="width:75%;height:100%;background:#00CD88;display:flex;justify-content:flex-end;align-items:center;padding-right:8px;color:#fff;font-family:var(--font-cn);font-weight:500;font-size:10px;">75%</div>
    </div>
  </div>

  <!-- 100% -->
  <div class="label" style="margin-bottom:4px;margin-top:8px;">100%</div>
  <div style="display:flex;align-items:center;gap:8px;padding:4px 0;max-width:343px;">
    <span style="font-family:var(--font-cn);font-weight:500;font-size:12px;color:#333;white-space:nowrap;">填写进度：</span>
    <div style="flex:1;height:18px;border-radius:8px;background:#F0F0F0;overflow:hidden;">
      <div style="width:100%;height:100%;background:#00CD88;display:flex;justify-content:flex-end;align-items:center;padding-right:8px;color:#fff;font-family:var(--font-cn);font-weight:500;font-size:10px;">100%</div>
    </div>
  </div>

</div></body></html>
