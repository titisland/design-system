<!doctype html><html lang="zh-CN"><head><meta charset="utf-8" />
<title>Buttons &amp; links</title><link rel="stylesheet" href="base.css" /></head><body>
<div class="card">

  <!-- PRIMARY — orange border, orange text, white bg -->
  <div class="label" style="margin-bottom:4px;">Primary — orange border + text</div>
  <div class="card-row">
    <button style="all:unset;cursor:pointer;font-family:var(--font-cn);font-weight:500;font-size:14px;padding:7px 22px;border-radius:100px;line-height:22px;background:#fff;color:#F7981D;border:1px solid #F7981D;">提交</button>
    <button style="all:unset;cursor:pointer;font-family:var(--font-cn);font-weight:500;font-size:14px;padding:7px 22px;border-radius:100px;line-height:22px;background:#fff;color:#F7981D;border:1px solid #F7981D;">确认</button>
  </div>

  <!-- GHOST — gray border, gray text, white bg -->
  <div class="label" style="margin-bottom:4px;margin-top:12px;">Ghost — gray border + text</div>
  <div class="card-row">
    <button style="all:unset;cursor:pointer;font-family:var(--font-cn);font-weight:500;font-size:14px;padding:7px 22px;border-radius:100px;line-height:22px;background:#fff;color:#333;border:1px solid #DDD;">编辑</button>
    <button style="all:unset;cursor:pointer;font-family:var(--font-cn);font-weight:500;font-size:14px;padding:7px 22px;border-radius:100px;line-height:22px;background:#fff;color:#333;border:1px solid #DDD;">删除</button>
  </div>

  <!-- TINY — smaller, gray border -->
  <div class="label" style="margin-bottom:4px;margin-top:12px;">Tiny — small pill</div>
  <div class="card-row">
    <button style="all:unset;cursor:pointer;font-family:var(--font-cn);font-weight:500;font-size:12px;padding:6px 14px;border-radius:100px;line-height:1;background:#fff;color:#333;border:1px solid #EEE;">查看</button>
    <button style="all:unset;cursor:pointer;font-family:var(--font-cn);font-weight:500;font-size:12px;padding:6px 14px;border-radius:100px;line-height:1;background:#fff;color:#333;border:1px solid #EEE;">展开</button>
  </div>

  <!-- SHEET NAV — step back / skip + glyph arrow -->
  <div class="label" style="margin-bottom:4px;margin-top:12px;">Sheet nav buttons — 返回 / 跳过</div>
  <div style="border-top:1px solid #EEE;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:8px;max-width:343px;">
    <button style="all:unset;cursor:pointer;font-family:var(--font-cn);font-size:12px;color:#333;text-align:center;padding:6px 12px;min-width:60px;display:flex;flex-direction:column;align-items:center;gap:2px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      返回
    </button>
    <button style="all:unset;cursor:pointer;font-family:var(--font-cn);font-size:12px;color:#333;text-align:center;padding:6px 12px;min-width:60px;display:flex;flex-direction:column;align-items:center;gap:2px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      跳过
    </button>
  </div>

  <!-- LINK — blue text -->
  <div class="label" style="margin-bottom:4px;margin-top:12px;">Link — blue text</div>
  <div class="card-row">
    <span style="font-family:var(--font-cn);font-size:14px;color:#007AFF;cursor:pointer;">全部跳过</span>
    <span style="font-family:var(--font-cn);font-size:14px;color:#007AFF;cursor:pointer;">重新开始</span>
  </div>

</div></body></html>
