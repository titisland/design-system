<!doctype html><html><head><meta charset="utf-8" />
<title>Voice gradient</title><link rel="stylesheet" href="base.css" /></head><body>
<div class="card">
  <div style="height:120px;border-radius:8px;background:linear-gradient(135deg,#45D4FB 0%,#57E9F2 52%,#9EFBD3 100%);display:flex;align-items:flex-end;padding:14px;color:rgba(0,0,0,0.55);font-family:var(--font-latin);font-size:12px;">
    --voice-gradient · linear-gradient(135deg, #45D4FB 0%, #57E9F2 52%, #9EFBD3 100%)
  </div>
  <div style="display:flex;gap:12px;align-items:center;">
    <div style="width:96px;height:96px;border-radius:100px;background:linear-gradient(180deg,rgba(158,251,211,.30) 0%,rgba(87,233,242,.30) 48%,rgba(69,212,251,.30) 100%);display:flex;justify-content:center;align-items:center;">
      <img src="../assets/avatar-voice-call.png" alt="" style="width:62px;height:62px;border-radius:100px;" />
    </div>
    <div style="flex:1;background:linear-gradient(135deg,#45D4FB 0%,#57E9F2 52%,#9EFBD3 100%);padding:14px 16px;border-radius:8px;font-family:var(--font-cn);font-size:14px;line-height:20px;color:#333;">
      想看真实世界的临床经验
    </div>
  </div>
  <div style="font-family:var(--font-cn);font-size:12px;color:var(--fg-2);line-height:18px;">
    始终 3 stops · 0% / 52% / 100% · 用户语音气泡 + 头像 halo + "创建报告" hero 气泡。
  </div>
</div></body></html>
