<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:20px;background:#fff;font-family:var(--font-cn)}
.r{display:flex;align-items:center;gap:12px;padding:3px 0}
.lbl{width:70px;font-size:12px;color:#666;font-variant-numeric:tabular-nums}
.bar{background:#F7981D;height:8px;border-radius:2px}
.tok{color:#999;font-size:11px;width:56px}
</style></head>
<body>
  <div class="r"><span class="lbl">4px</span><span class="tok">--sp-1</span><span class="bar" style="width:4px"></span></div>
  <div class="r"><span class="lbl">8px</span><span class="tok">--sp-2</span><span class="bar" style="width:8px"></span></div>
  <div class="r"><span class="lbl">12px</span><span class="tok">--sp-3</span><span class="bar" style="width:12px"></span></div>
  <div class="r"><span class="lbl">16px</span><span class="tok">--sp-4</span><span class="bar" style="width:16px"></span></div>
  <div class="r"><span class="lbl">20px</span><span class="tok">--sp-5</span><span class="bar" style="width:20px"></span></div>
  <div class="r"><span class="lbl">24px</span><span class="tok">--sp-6</span><span class="bar" style="width:24px"></span></div>
  <div class="r"><span class="lbl">32px</span><span class="tok">--sp-8</span><span class="bar" style="width:32px"></span></div>
</body></html>
