<!doctype html><html><head><meta charset="utf-8" />
<title>Report card</title><link rel="stylesheet" href="base.css" /></head><body>
<div class="card" style="background:#FAFAFA;">
<div style="width:100%;background:#F8F8F8;border-radius:12px;box-shadow:0 0 20px rgba(0,0,0,.05);padding:8px 8px 16px 8px;display:flex;flex-direction:column;gap:12px;">
  <div style="background:#fff;border-radius:8px;padding:12px 8px;">
    <div style="display:flex;align-items:center;gap:8px;padding:0 8px 8px;">
      <img src="../assets/icons/Homepage/Homepage-我的医生.svg" width="20" height="20" style="border-radius:5px;flex-shrink:0;" />
      <span style="font-family:var(--font-cn);font-weight:500;font-size:16px;color:#000;">李建</span>
    </div>
    <div style="padding:0 8px;display:flex;flex-direction:column;gap:12px;">
      <div style="font-family:var(--font-cn);font-size:14px;line-height:18px;"><b style="font-weight:500;color:#333;">拜访日期：</b><span style="color:#666;">2026 年 3 月 15 日</span></div>
      <div style="font-family:var(--font-cn);font-size:14px;line-height:18px;"><b style="font-weight:500;color:#333;">拜访目标：</b><span style="color:#666;">产品介绍</span></div>
      <div style="font-family:var(--font-cn);font-size:14px;line-height:20px;">
        <b style="font-weight:500;color:#333;">拜访总结：</b>
        <div style="color:#666;margin-top:6px;">沟通了百泽安围手术期 41% 的 pCR 率，主任反馈平淡，要求提供更多临床数据以作进一步佐证。</div>
        <div style="display:flex;justify-content:flex-end;margin-top:6px;">
          <span style="background:rgba(0,122,255,.05);color:#007AFF;font-family:var(--font-latin);font-size:12px;border-radius:20px;padding:2px 10px;display:inline-flex;align-items:center;gap:4px;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>
            English
          </span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;padding-top:4px;">
        <span style="font-family:var(--font-cn);font-weight:500;font-size:12px;color:#333;">填写进度：</span>
        <div style="flex:1;height:18px;border-radius:8px;background:#F2F2F2;overflow:hidden;">
          <div style="height:100%;width:100%;background:#00DF93;display:flex;justify-content:flex-end;align-items:center;padding-right:8px;color:#fff;font-family:var(--font-cn);font-weight:500;font-size:10px;">100%</div>
        </div>
      </div>
    </div>
  </div>
  <div style="display:flex;gap:12px;justify-content:flex-end;padding:0 8px;">
    <button style="all:unset;cursor:pointer;font-family:var(--font-cn);font-weight:500;font-size:14px;color:#333;background:#fff;border:1px solid #E2E2E2;border-radius:100px;padding:7px 20px;">删除</button>
    <button style="all:unset;cursor:pointer;font-family:var(--font-cn);font-weight:500;font-size:14px;color:#333;background:#fff;border:1px solid #E2E2E2;border-radius:100px;padding:7px 20px;">编辑</button>
    <button style="all:unset;cursor:pointer;font-family:var(--font-cn);font-weight:500;font-size:14px;color:#F7981D;background:#fff;border:1px solid #F7981D;border-radius:100px;padding:7px 22px;">提交</button>
  </div>
</div>
</div></body></html>
