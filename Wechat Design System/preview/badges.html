<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:20px;background:#fff;font-family:var(--font-cn)}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.b{padding:2px 8px;border-radius:4px;font-size:12px}
.tag{padding:2px 6px;border-radius:2px;font-size:12px;background:rgba(32,105,214,.08);color:#2069D6}
</style></head>
<body>
  <div class="row">
    <span class="b" style="background:rgba(247,152,29,.1);color:#F7981D">审批通过</span>
    <span class="b" style="background:rgba(32,105,214,.08);color:#2069D6">草稿</span>
    <span class="b" style="background:rgba(0, 223, 147,.12);color:#00DF93">已完成</span>
    <span class="b" style="background:#F5F5F5;color:#999">未开始</span>
    <span class="b" style="background:rgba(255,85,67,.1);color:#FF5543">已驳回</span>
  </div>
  <div class="row">
    <span class="tag">微信已认证</span>
    <span class="tag">公众号已关注</span>
    <span class="tag">国家级</span>
  </div>
  <div style="font-size:11px;color:#888;margin-top:6px">Tinted bg (color @ 8–12%) · matching color text · 12px · 2/8 padding</div>
</body></html>
