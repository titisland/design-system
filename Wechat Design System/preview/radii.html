<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><title>Radius — 2026 spec</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:24px;background:#fff;font-family:var(--font-cn)}
  h2{font-size:16px;font-weight:500;margin:0 0 12px}
  .row{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;margin-bottom:24px}
  .box{width:120px;text-align:center}
  .sh{width:120px;height:88px;background:#fff;border:1px solid var(--color-border-base);
      display:flex;flex-direction:column;align-items:center;justify-content:center;color:#000;font-size:13px;font-weight:500}
  .sh .v{font-size:11px;color:#999;font-weight:400;margin-top:4px}
  .lbl{font-size:11px;color:#888;padding-top:8px}
  .lbl b{display:block;color:#222;font-weight:500;margin-bottom:2px}
</style></head>
<body>
<h2>Radius — 2026 spec (五档，没有 8 / 12)</h2>
<div class="row">
  <div class="box">
    <div class="sh" style="border-radius:var(--r-none)">None<span class="v">0px</span></div>
    <div class="lbl"><b>--r-none</b>无圆角</div>
  </div>
  <div class="box">
    <div class="sh" style="border-radius:var(--r-small)">Small<span class="v">2px</span></div>
    <div class="lbl"><b>--r-small</b>chip / 微调</div>
  </div>
  <div class="box">
    <div class="sh" style="border-radius:var(--r-base)">Base<span class="v">4px</span></div>
    <div class="lbl"><b>--r-base</b>默认 / 输入框 / 卡片</div>
  </div>
  <div class="box">
    <div class="sh" style="border-radius:var(--r-round)">Round<span class="v">20px</span></div>
    <div class="lbl"><b>--r-round</b>大卡片 / Modal</div>
  </div>
  <div class="box">
    <div class="sh" style="border-radius:var(--r-circle);background:var(--color-brand-veeva);color:#fff;border-color:var(--color-brand-veeva)">Circle<span class="v" style="color:rgba(255,255,255,.7)">100%</span></div>
    <div class="lbl"><b>--r-circle</b>胶囊 / FAB / 圆形头像</div>
  </div>
</div>
</body></html>
