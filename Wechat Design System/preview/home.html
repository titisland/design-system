<style>
  html, body { margin:0; padding:0; background:var(--color-bg-white); font-family:var(--font-cn); }
  .stage { padding:32px; display:flex; gap:32px; flex-wrap:wrap; align-items:flex-start; justify-content:center; }
  .phone {
    width:100%; max-width:440px; min-height:956px; background:var(--color-bg-white);
    border:1px solid var(--color-border-base); border-radius:16px; overflow:hidden;
    box-shadow:var(--shadow-base);
  }
  /* iOS status icon glyphs — same helpers as in component-navbar.html */
  .si-signal { display:inline-flex; gap:1.5px; align-items:flex-end; }
  .si-signal span { width:3px; background:var(--color-white); border-radius:1px; }
  .si-signal span:nth-child(1) { height:3px; }
  .si-signal span:nth-child(2) { height:5px; }
  .si-signal span:nth-child(3) { height:7px; }
  .si-signal span:nth-child(4) { height:9px; }
  .si-batt { width:22px; height:11px; border:1px solid var(--color-white); border-radius:2px; position:relative; padding:1px; }
  .si-batt::after { content:""; position:absolute; right:-3px; top:3px; width:1.5px; height:5px; background:var(--color-white); border-radius:0 1px 1px 0; }
  .si-batt-fill { height:100%; width:75%; background:var(--color-white); border-radius:1px; }

  .home-body { background:var(--color-bg-white); }
  .phone__home { height:34px; background:var(--color-bg-white); display:flex; align-items:flex-start; justify-content:center; padding-top:21px; }
  .phone__home::after { content:""; width:134px; height:5px; border-radius:3px; background:#000; opacity:0.85; }

  /* Spacer between sections */
  .stack > * + * { margin-top:8px; }
  .stack { background:var(--color-bg-white); padding-bottom:8px; }
</style>
