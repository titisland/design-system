<!doctype html><html><head><meta charset="utf-8" />
<title>Modal sheet</title><link rel="stylesheet" href="base.css" /></head><body>
<div class="card" style="background:#FAFAFA;">
<div style="width:393px;margin:0 auto;background:#fff;border:1px solid #EEE;border-radius:12px 12px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.15);overflow:hidden;">
  <div style="background:rgba(255,255,255,.6);border-bottom:1px solid #EEE;padding:13px 16px;display:flex;align-items:center;">
    <span style="font-family:var(--font-cn);font-size:14px;color:#007AFF;line-height:22px;">全部跳过</span>
    <span style="flex:1;text-align:center;font-family:var(--font-cn);font-weight:500;font-size:14px;color:#333;line-height:22px;">AI 追问</span>
    <span style="font-family:var(--font-cn);font-size:14px;color:#333;line-height:22px;">1/3</span>
  </div>
  <div style="padding:16px;display:flex;flex-direction:column;gap:14px;">
    <div style="display:flex;gap:8px;align-items:flex-start;">
      <img src="../assets/avatar-voice-call.png" style="width:28px;height:28px;border-radius:100px;" />
      <span style="font-family:var(--font-cn);font-size:14px;color:#333;padding-top:4px;line-height:20px;">这个点你记得很关键，PCR 率和他的需求都抓到了！</span>
    </div>
    <div style="font-family:var(--font-cn);font-weight:500;font-size:14px;color:#333;line-height:20px;">李主任听到 41% 这个数，更像是哪种反应？</div>
    <div style="display:flex;flex-direction:column;gap:14px;">
      <div style="border:1px solid #E2E2E2;border-radius:12px;padding:12px 14px;font-family:var(--font-cn);font-size:14px;color:#333;">觉得这个数字本身不够高</div>
      <div style="border:1px solid #007AFF;border-radius:12px;padding:12px 14px;font-family:var(--font-cn);font-size:14px;color:#333;">对 PCR 能预测长期生存有保留</div>
    </div>
  </div>
</div>
</div></body></html>
