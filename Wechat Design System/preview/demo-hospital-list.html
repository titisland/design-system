<style>
  html, body { margin:0; padding:0; background:var(--color-bg-f8); font-family:var(--font-cn); }
  .stage { padding:32px; display:flex; gap:32px; flex-wrap:wrap; align-items:flex-start; justify-content:center; }

  /* Phone canvas */
  .phone {
    width:100%; max-width:440px; height:956px; background:var(--color-bg-f8);
    border:1px solid var(--color-border-base);
    border-radius:16px; overflow:hidden;
    display:flex; flex-direction:column;
    box-shadow:var(--shadow-base);
  }

  /* Top status bar */
  /* Status bar inner decoration — scoped under ea-navbar__status-icons */
  .ea-navbar__status-icons .signal { display:inline-flex; gap:1.5px; align-items:flex-end; }
  .ea-navbar__status-icons .signal span { width:3px; background:#fff; border-radius:1px; }
  .ea-navbar__status-icons .signal span:nth-child(1) { height:3px; }
  .ea-navbar__status-icons .signal span:nth-child(2) { height:5px; }
  .ea-navbar__status-icons .signal span:nth-child(3) { height:7px; }
  .ea-navbar__status-icons .signal span:nth-child(4) { height:9px; }
  .ea-navbar__status-icons .battery {
    width:22px; height:10px; border:1px solid #fff; border-radius:2px;
    position:relative; padding:1px;
  }
  .ea-navbar__status-icons .battery::after {
    content:""; position:absolute; right:-3px; top:3px; width:1.5px; height:4px;
    background:#fff; border-radius:0 1px 1px 0;
  }
  .ea-navbar__status-icons .battery-fill { height:100%; width:75%; background:#fff; border-radius:1px; }

  /* Home indicator */
  .phone__home {
    height:34px; background:var(--color-bg-white);
    display:flex; align-items:flex-start; justify-content:center; padding-top:21px;
  }
  .phone__home::after {
    content:""; width:134px; height:5px; border-radius:3px;
    background:#000; opacity:0.85;
  }

  .caption {
    text-align:center; color:var(--color-fg-h4); font-size:12px;
    margin-top:8px;
    font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
</style>
</head>
