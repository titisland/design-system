<!doctype html><html lang="zh-CN"><head><meta charset="utf-8" />
<title>Option rows</title><link rel="stylesheet" href="base.css" /></head><body>
<div class="card">

  <!-- DEFAULT (unselected) -->
  <div class="label" style="margin-bottom:4px;">Default — unselected</div>
  <div style="display:flex;flex-direction:column;gap:12px;max-width:343px;">
    <div style="border:1px solid #DDD;border-radius:12px;padding:12px 14px;font-family:var(--font-cn);font-size:14px;color:#333;cursor:pointer;">觉得这个数字本身不够高</div>
    <div style="border:1px solid #DDD;border-radius:12px;padding:12px 14px;font-family:var(--font-cn);font-size:14px;color:#333;cursor:pointer;">对 PCR 能预测长期生存有保留</div>
    <div style="border:1px solid #DDD;border-radius:12px;padding:12px 14px;font-family:var(--font-cn);font-size:14px;color:#333;cursor:pointer;">没有直接表态，比较圆滑带过</div>
  </div>

  <!-- SELECTED state -->
  <div class="label" style="margin-bottom:4px;margin-top:16px;">Selected — blue border</div>
  <div style="display:flex;flex-direction:column;gap:12px;max-width:343px;">
    <div style="border:1px solid #007AFF;border-radius:12px;padding:12px 14px;font-family:var(--font-cn);font-size:14px;color:#333;cursor:pointer;">觉得这个数字本身不够高</div>
    <div style="border:1px solid #DDD;border-radius:12px;padding:12px 14px;font-family:var(--font-cn);font-size:14px;color:#333;cursor:pointer;">对 PCR 能预测长期生存有保留</div>
    <div style="border:1px solid #DDD;border-radius:12px;padding:12px 14px;font-family:var(--font-cn);font-size:14px;color:#333;cursor:pointer;">没有直接表态，比较圆滑带过</div>
  </div>

  <!-- VOICE INPUT row -->
  <div class="label" style="margin-bottom:4px;margin-top:16px;">Voice input row — open text</div>
  <div style="max-width:343px;border:1px solid #DDD;border-radius:12px;padding:12px 14px;font-family:var(--font-cn);font-size:14px;color:rgba(153,153,153,0.6);display:flex;align-items:center;justify-content:space-between;cursor:pointer;">
    <span>还有其他顾虑？比如医生的原话等</span>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="13" rx="3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
  </div>

</div></body></html>
