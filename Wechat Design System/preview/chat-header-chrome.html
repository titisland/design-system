<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; background: #fff; }
  .frame { display: flex; flex-direction: column; }
  .status {
    height: 44px; background: #007AFF; color: #fff;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 22px;
    font: 500 15px/100% var(--font-roman);
  }
  .icons { display: flex; gap: 4px; }
  .icons svg { width: 16px; height: 16px; }
  .nav {
    height: 44px; background: #007AFF; color: #fff;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px;
    font: 500 17px/100% var(--font-han);
  }
  .nav .center { position: absolute; left: 50%; transform: translateX(-50%); }
  .nav-inner { width: 100%; display: flex; align-items: center; justify-content: space-between; position: relative; }
  .body { background: #fff; padding: 14px 16px; min-height: 24px; font: 400 13px/100% var(--font-han); color: #999; }
</style></head><body>
  <div class="frame">
    <div class="status">
      <span>11:31</span>
      <div class="icons">
        <svg viewBox="0 0 24 16" fill="currentColor"><rect x="0" y="6" width="3" height="6" rx="1"/><rect x="5" y="3" width="3" height="9" rx="1"/><rect x="10" y="0" width="3" height="12" rx="1"/></svg>
        <svg viewBox="0 0 24 16" fill="currentColor"><path d="M2 8 Q12 -2 22 8 M5 11 Q12 3 19 11 M9 14 Q12 10 15 14"/></svg>
        <svg viewBox="0 0 28 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="22" height="10" rx="2"/><rect x="3" y="5" width="18" height="6" rx="1" fill="currentColor"/><rect x="24" y="6" width="2" height="4" fill="currentColor"/></svg>
      </div>
    </div>
    <div class="nav">
      <div class="nav-inner">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        <span class="center">医生详情</span>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="19" cy="12" r="1.8"/></svg>
      </div>
    </div>
    <div class="body">Host CRM blue header · 44 status + 44 nav · white "More" dots right-aligned · title 17/500</div>
  </div>
</body></html>
