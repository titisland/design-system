<!doctype html><html><head><meta charset="utf-8" />
<title>Mascot logo</title><link rel="stylesheet" href="base.css" /></head><body>
<div class="card" style="background:#FAFAFA;align-items:center;">
  <div style="display:flex;align-items:center;gap:32px;">
    <!-- big halo -->
    <div style="width:160px;height:160px;border-radius:100px;background:linear-gradient(180deg,rgba(158,251,211,.30) 0%,rgba(87,233,242,.30) 48%,rgba(69,212,251,.30) 100%);display:flex;align-items:center;justify-content:center;">
      <img src="../assets/avatar-voice-call.png" style="width:104px;height:104px;" />
    </div>
    <!-- medium -->
    <div style="width:80px;height:80px;border-radius:100px;background:linear-gradient(180deg,rgba(158,251,211,.30) 0%,rgba(87,233,242,.30) 48%,rgba(69,212,251,.30) 100%);display:flex;align-items:center;justify-content:center;">
      <img src="../assets/avatar-voice-call.png" style="width:52px;height:52px;" />
    </div>
    <!-- inline -->
    <img src="../assets/avatar-voice-call.png" style="width:40px;height:40px;border-radius:100px;" />
    <img src="../assets/avatar-voice-call.png" style="width:28px;height:28px;border-radius:100px;" />
  </div>
  <div style="font-family:var(--font-cn);font-size:12px;color:var(--fg-2);line-height:18px;text-align:center;max-width:520px;">
    Voice Call 吉祥物 · 唯一具象品牌符号 · 总是放在 cyan-mint halo 中（halo 30% alpha 渐变）。无文字 logo。
  </div>
</div></body></html>
