<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Event card — Chat AI Agent</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../lists.css">
<link rel="stylesheet" href="../chat-shell.css">
<link rel="stylesheet" href="../chat-cards.css">
<style>
html, body { margin:0; padding:0; background:#F8F8F8; font-family:var(--font-cn); color:var(--fg-default); }
.preview-page { max-width:860px; margin:0 auto; padding:32px 24px 80px; }
h2 { font-size:13px; font-weight:600; color:#999; letter-spacing:0.06em; text-transform:uppercase;
      margin:48px 0 16px; border-top:1px solid #EEE; padding-top:24px; }
h2:first-of-type { margin-top:0; }
.swatch-row { display:flex; gap:16px; flex-wrap:wrap; align-items:flex-start; }
.label { font-size:12px; color:#999; margin-bottom:6px; }
.note { font-size:12px; color:#888; background:#FFF8E6; border-left:3px solid #F7981D;
         padding:8px 12px; border-radius:0 4px 4px 0; margin-top:12px; line-height:18px; }
.note code { font-family:monospace; font-size:11px; color:#555; }
.ea-event-card { width:311px; border:1px solid var(--color-border-base); border-radius:8px;
                 background:var(--color-bg-white); padding:12px; position:relative; }
.ea-event-card__badge { position:absolute; top:12px; right:12px; font-size:12px; color:var(--color-brand-veeva); }
.ea-event-card__head { display:flex; gap:8px; align-items:flex-start; }
.ea-event-card__ico { width:28px; height:28px; border-radius:4px; background:#EFF3FC;
                      display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.ea-event-card__title { font-size:16px; font-weight:var(--fw-medium); color:var(--fg-default); line-height:20px; }
.ea-event-card__meta { font-size:14px; color:var(--fg-muted); line-height:22px; }
</style>
</head>
<body>
<div class="preview-page">
  <!-- ═══════════════════════════════════════════════════════

</div>
</body>
</html>
