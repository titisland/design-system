<!doctype html><html lang="zh-CN"><head><meta charset="utf-8" />
<title>Chrome — nav bars</title><link rel="stylesheet" href="base.css" /></head><body>
<div class="card">

  <!-- STATUS BAR + NAV BAR (standard, no subheader) -->
  <div class="label" style="margin-bottom:4px;">Status bar + nav bar — standard</div>
  <div style="width:375px;border-radius:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.14);">
    <div style="height:44px;background:#3975C6;display:flex;justify-content:space-between;align-items:center;padding:0 22px;">
      <span style="font-weight:700;font-size:15px;letter-spacing:-.3px;color:#fff;">11:31</span>
      <div style="display:flex;align-items:center;gap:6px;">
        <svg width="17" height="11" viewBox="0 0 24 16" fill="#fff"><rect x="2" y="10" width="3" height="6" rx="1"/><rect x="7" y="6" width="3" height="10" rx="1"/><rect x="12" y="2" width="3" height="14" rx="1"/></svg>
        <svg width="16" height="11" viewBox="0 0 24 16" fill="none" stroke="#fff" stroke-width="2"><path d="M2 6c5-4 15-4 20 0M5 10c3-2.5 11-2.5 14 0M9 14c1-1 5-1 6 0"/></svg>
        <svg width="22" height="11" viewBox="0 0 24 12" fill="none" stroke="#fff" stroke-width="1.5"><rect x="1" y="1" width="18" height="10" rx="2"/><rect x="3" y="3" width="14" height="6" rx="1" fill="#fff"/><rect x="20" y="4" width="2" height="4" rx="1" fill="#fff"/></svg>
      </div>
    </div>
    <div style="height:44px;background:#3975C6;display:flex;align-items:center;padding:0 14px;">
      <button style="all:unset;cursor:pointer;padding:6px;display:flex;align-items:center;justify-content:center;">
        <svg width="14" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div style="flex:1;text-align:center;font-family:var(--font-cn);font-weight:500;font-size:17px;color:#fff;">Veeva China SFA</div>
      <button style="all:unset;cursor:pointer;padding:6px;display:flex;align-items:center;justify-content:center;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><circle cx="6" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="18" cy="12" r="2"/></svg>
      </button>
    </div>
  </div>

  <!-- WITH ORANGE SUBHEADER -->
  <div class="label" style="margin-bottom:4px;margin-top:8px;">With orange subheader band</div>
  <div style="width:375px;border-radius:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.14);">
    <div style="height:44px;background:#3975C6;display:flex;justify-content:space-between;align-items:center;padding:0 22px;">
      <span style="font-weight:700;font-size:15px;letter-spacing:-.3px;color:#fff;">11:31</span>
      <div style="display:flex;align-items:center;gap:6px;">
        <svg width="17" height="11" viewBox="0 0 24 16" fill="#fff"><rect x="2" y="10" width="3" height="6" rx="1"/><rect x="7" y="6" width="3" height="10" rx="1"/><rect x="12" y="2" width="3" height="14" rx="1"/></svg>
        <svg width="16" height="11" viewBox="0 0 24 16" fill="none" stroke="#fff" stroke-width="2"><path d="M2 6c5-4 15-4 20 0M5 10c3-2.5 11-2.5 14 0M9 14c1-1 5-1 6 0"/></svg>
        <svg width="22" height="11" viewBox="0 0 24 12" fill="none" stroke="#fff" stroke-width="1.5"><rect x="1" y="1" width="18" height="10" rx="2"/><rect x="3" y="3" width="14" height="6" rx="1" fill="#fff"/><rect x="20" y="4" width="2" height="4" rx="1" fill="#fff"/></svg>
      </div>
    </div>
    <div style="height:44px;background:#3975C6;display:flex;align-items:center;padding:0 14px;">
      <button style="all:unset;padding:6px;display:flex;align-items:center;">
        <svg width="14" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div style="flex:1;text-align:center;font-family:var(--font-cn);font-weight:500;font-size:17px;color:#fff;">Veeva China SFA</div>
      <button style="all:unset;padding:6px;display:flex;align-items:center;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><circle cx="6" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="18" cy="12" r="2"/></svg>
      </button>
    </div>
    <div style="height:40px;background:#F7981D;display:flex;align-items:center;justify-content:center;font-family:var(--font-cn);font-size:17px;color:#fff;">Voice Call</div>
  </div>

</div></body></html>
