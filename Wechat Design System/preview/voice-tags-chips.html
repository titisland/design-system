<!doctype html><html lang="zh-CN"><head><meta charset="utf-8" />
<title>Tags &amp; chips</title><link rel="stylesheet" href="base.css" /></head><body>
<div class="card">

  <!-- MODE PILL — Voice Call selector in the dock -->
  <div class="label" style="margin-bottom:4px;">Mode pill — dock selector</div>
  <div class="card-row">
    <div style="display:inline-flex;align-items:center;gap:6px;background:#F5F5F5;border-radius:100px;padding:4px 12px;font-family:var(--font-cn);font-weight:500;font-size:14px;color:#333;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      Voice Call
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
  </div>

  <!-- LANG TAG — English / bilingual label -->
  <div class="label" style="margin-bottom:4px;margin-top:12px;">Language tag — English</div>
  <div class="card-row">
    <span style="background:rgba(0,122,255,0.05);color:#007AFF;font-size:12px;border-radius:20px;padding:2px 10px;display:inline-flex;align-items:center;gap:4px;">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>
      English
    </span>
  </div>

  <!-- AI BADGE — followup answered confirmation -->
  <div class="label" style="margin-bottom:4px;margin-top:12px;">AI badge — followup confirmation</div>
  <div style="background:rgba(0,122,255,0.04);border:1px solid #DDD;border-radius:8px;padding:8px;display:flex;align-items:center;gap:8px;max-width:343px;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/></svg>
    <span style="flex:1;font-family:var(--font-cn);font-size:14px;color:#666;">已回答 3 个问题</span>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
  </div>

  <!-- AI DISCLAIMER — bottom of dock -->
  <div class="label" style="margin-bottom:4px;margin-top:12px;">AI disclaimer text</div>
  <div style="font-size:12px;letter-spacing:.167px;color:#AAA;font-family:var(--font-cn);">内容由 AI 生成</div>

  <!-- SHEET HEADER count tag -->
  <div class="label" style="margin-bottom:4px;margin-top:12px;">Sheet step counter — 1/3</div>
  <div style="font-family:var(--font-cn);font-size:14px;color:#333;">1/3</div>

</div></body></html>
