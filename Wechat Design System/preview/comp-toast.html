<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>Toast — Status row</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: #FFF;
         display: flex; flex-direction: column; gap: 6px; }
  .toast {
    width: 100%;
    height: 50px;
    display: flex; align-items: center;
    padding: 0 15px;
    gap: 10px;
    font-size: 14px;
    line-height: 20px;
    font-family: var(--font-han-sans);
  }
  .toast svg { flex: 0 0 20px; }
</style>
</head>
<body>
  <div class="toast" style="background:#CCF9E9;color:#00CD88">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12.5l2.8 2.8L16.5 9.5"/></svg>
    <span>请输入提示信息文本 — Success</span>
  </div>
  <div class="toast" style="background:#FFDDD9;color:#FF5543">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6"/><path d="M9 9l6 6"/></svg>
    <span>请输入提示信息文本 — Fail</span>
  </div>
  <div class="toast" style="background:#FFF5CC;color:#F7981D">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="7.5" x2="12" y2="13"/><circle cx="12" cy="16.25" r="0.8" fill="currentColor" stroke="none"/></svg>
    <span>请输入提示信息文本 — Warning</span>
  </div>
  <div class="toast" style="background:#D6DAE0;color:#7788A2">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="7.5" x2="12" y2="13"/><circle cx="12" cy="16.25" r="0.8" fill="currentColor" stroke="none"/></svg>
    <span>请输入提示信息文本 — Hint</span>
  </div>
</body>
</html>
