<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>Bottom-fixed banner</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 20px 24px; background: #FFF;
         display: flex; flex-direction: column; gap: 0; align-items: center; }
  .bar {
    width: 375px; height: 25px;
    display: flex; align-items: center; justify-content: center;
    color: #FFF; font-size: 14px; line-height: 25px;
    font-family: var(--font-han-sans);
  }
  .note { font-size: 11px; color: var(--color-fg-3); margin-top: 10px;
          text-align: center; max-width: 460px; line-height: 1.5; }
</style>
</head>
<body>
  <div class="bar" style="background:#AAAAAA">请输入文字信息</div>
  <div class="bar" style="background:#F6A950">请输入文字信息</div>
  <div class="bar" style="background:#FA9489">请输入文字信息</div>
  <div class="note">"底部固定提示" — full-width, square corners, 25px tall, centered text.
    Gray = info, yellow = warn, red = error. ≤ 25 Chinese characters per line.</div>
</body>
</html>
