<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 20px; }
  .banner {
    border-radius: 6px;
    padding: 12px 14px;
    font: 400 13px/20px var(--font-han);
    display: flex; gap: 10px; align-items: flex-start;
  }
  .b-normal { background: #F5F5F5; color: #999; }
  .b-highlight { background: #FFFED4; color: #F89728; }
  .b-warn { background: #FFE8E5; color: #FF5543; }
  .lbl { font: 500 11px/14px var(--font-han); color: var(--fg-3); margin-bottom: 6px; }
  .stack { display: flex; flex-direction: column; gap: 10px; }
</style></head><body>
  <div class="stack">
    <div>
      <div class="lbl">普通提示 — auxiliary info</div>
      <div class="banner b-normal">注意：王主任的FFGO将于 2025-08-10 失效。若能在会前确保其资格有效，我们强烈推荐邀请这位参会人。</div>
    </div>
    <div>
      <div class="lbl">高亮提示 — needs attention</div>
      <div class="banner b-highlight">注意：王主任的FFGO将于 2025-08-10 失效。若能在会前确保其资格有效，我们强烈推荐邀请这位参会人。</div>
    </div>
    <div>
      <div class="lbl">警示提示 — warning / error</div>
      <div class="banner b-warn">注意：王主任的FFGO将于 2025-08-10 失效。若能在会前确保其资格有效，我们强烈推荐邀请这位参会人。</div>
    </div>
  </div>
</body></html>
