<!doctype html><html><head><meta charset="utf-8" />
<title>Bubbles</title><link rel="stylesheet" href="base.css" /></head><body>
<div class="card">
  <!-- USER bubble — gradient, right aligned -->
  <div style="display:flex;justify-content:flex-end;">
    <div style="max-width:88%;background:linear-gradient(135deg,#45D4FB 0%,#57E9F2 52%,#9EFBD3 100%);border-radius:8px;padding:16px;font-family:var(--font-cn);font-size:14px;line-height:20px;color:#333;">
      今天拜访了李主任，跟他聊了百泽安围手术期 pCR 率 41%，他反馈一般，他需要我提供更多的临床数据佐证
    </div>
  </div>
  <!-- AGENT short bubble -->
  <div style="display:flex;align-items:flex-start;gap:8px;">
    <img src="../assets/avatar-voice-call.png" style="width:28px;height:28px;border-radius:100px;" />
    <div style="font-family:var(--font-cn);font-size:14px;line-height:20px;color:#333;padding-top:4px;">这个点你记得很关键，PCR 率和他的需求都抓到了！</div>
  </div>
  <!-- AGENT info card (left) -->
  <div style="background:#F8F8F8;border-radius:8px;padding:16px;font-family:var(--font-cn);font-size:14px;line-height:20px;color:#000;max-width:88%;">
    嗨！我是你的拜访助手 Voice Call，很高兴为你服务！<br/>· 医生姓名 · 拜访日期 · 拜访目标 · 关键信息
  </div>
</div></body></html>
