<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:20px;background:#F8F8F8;font-family:var(--font-cn)}
.card{width:311px;border:1px solid #eee;border-radius:8px;background:#fff;padding:12px;position:relative}
.head{display:flex;gap:8px;align-items:flex-start}
.ico{width:28px;height:28px;border-radius:4px;background:#EFF3FC;display:flex;align-items:center;justify-content:center;flex:none}
.ico img{width:18px;height:18px}
.title{font-size:16px;font-weight:500;color:#000;line-height:20px}
.meta{font-size:14px;color:#666;line-height:22px}
.badge{position:absolute;top:12px;right:12px;color:#F7981D;font-size:12px}
</style></head>
